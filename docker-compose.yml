services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: quill-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: development
      BACKEND_PORT: 3000
      MONGODB_URI: mongodb://host.docker.internal:27017/quill?replicaSet=rs0
      REDIS_URL: redis://redis:6379
      SWAGGER_ENABLED: "true"
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    depends_on:
      mongodb-init-replica:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/system/health/ready').then(response => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - public
      - data

  mongodb:
    image: mongo:7
    container_name: quill-mongodb
    restart: unless-stopped
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: quill
    volumes:
      - mongodb_dev_data:/data/db
    networks:
      - data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mongosh --quiet --eval \"try { rs.status().ok } catch (error) { 0 }\" | grep 1",
        ]
      interval: 5s
      timeout: 5s
      retries: 20

  mongodb-init-replica:
    image: mongo:7
    container_name: quill-mongodb-init
    restart: "no"
    depends_on:
      mongodb:
        condition: service_started
    entrypoint:
      [
        "bash",
        "-lc",
        "until mongosh mongodb://mongodb:27017/admin?directConnection=true --quiet --eval \"db.adminCommand({ ping: 1 }).ok\" | grep 1; do sleep 2; done; mongosh mongodb://mongodb:27017/admin?directConnection=true --quiet --eval \"const host = 'host.docker.internal:27017'; const config = db.getSiblingDB('local').system.replset.findOne(); if (!config) { db.adminCommand({ replSetInitiate: { _id: 'rs0', members: [{ _id: 0, host }] } }); } else if (config.members[0].host !== host) { config.version = (config.version || 1) + 1; config.members[0].host = host; db.adminCommand({ replSetReconfig: config, force: true }); } else { db.adminCommand({ ping: 1 }).ok; }\"",
      ]
    networks:
      - data

  redis:
    image: redis:7-alpine
    container_name: quill-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - data

volumes:
  mongodb_dev_data:
  redis_dev_data:

networks:
  public:
  data:
